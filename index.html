<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIRISE Ad Margin Calculator</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Icons ---
        const IconCalculator = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/></svg>
        );
        const IconFileText = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        );
        const IconIndianRupee = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 3h12"/><path d="M6 8h12"/><path d="M6 13h8.5l-5 8"/><path d="M6 13h3a4 4 0 0 0 0-8"/></svg>
        );
        const IconRefreshCw = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const IconAlertCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        );
        const IconLoader2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );
        const IconCheckCircle2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const IconShoppingCart = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        );
        const IconBuilding = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        );
        const IconLock = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        );
        const IconX = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
        );
        const IconCopy = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        );

        function App() {
            // --- Authentication State ---
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pin, setPin] = useState('');
            const [pinError, setPinError] = useState(false);

            // --- App State ---
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            const [activeTab, setActiveTab] = useState('SC'); 
            const [filterModel, setFilterModel] = useState(''); // Dropdown Filter State
            const [copiedId, setCopiedId] = useState(null); // Copy Feedback State
            
            const [appName, setAppName] = useState('Loading...'); 
            const [summary, setSummary] = useState({
                totalQty: 0,
                totalExSh: 0,
                totalHirise: 0,
                totalAdInv: 0,
                totalTcsAmount: 0,
                totalWithTcs: 0,
            });

            // Login Handler
            const handleLogin = (e) => {
                e.preventDefault();
                if (pin === '2026') {
                    setIsAuthenticated(true);
                    setPinError(false);
                } else {
                    setPinError(true);
                    setPin(''); // clear pin on error
                }
            };

            // Fetch data directly from Google Sheets
            useEffect(() => {
                if (!isAuthenticated) return; // Only fetch if logged in

                const fetchSheetData = async () => {
                    try {
                        setLoading(true);
                        const sheetId = '1O186p27Po4JkaoDIWYTDHgA46NclqA4DxX3HoBcqlPA';
                        const gid = '634411474';
                        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;
                        
                        const response = await fetch(url);
                        const text = await response.text();
                        
                        const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                        const data = JSON.parse(jsonString);
                        
                        // Extract dynamic app name from cell I1
                        let fetchedAppName = 'HIRISE AD MARGIN CALCULATION';
                        if (data.table.cols && data.table.cols[8] && data.table.cols[8].label) {
                            fetchedAppName = data.table.cols[8].label;
                        } else if (data.table.rows && data.table.rows.length > 0 && data.table.rows[0].c && data.table.rows[0].c[8] && data.table.rows[0].c[8].v) {
                            fetchedAppName = data.table.rows[0].c[8].v;
                        }
                        setAppName(fetchedAppName);

                        const rows = data.table.rows;
                        const fetchedItems = [];

                        rows.forEach((row, index) => {
                            if (!row || !row.c) return;

                            const cat = row.c[1]?.v || '';
                            const name = row.c[2]?.v || '';
                            const variant = row.c[3]?.v || '';
                            let exShPrice = row.c[4]?.v;
                            let hiriseInput = row.c[5]?.v;
                            let adInvPrice = row.c[6]?.v;

                            if (typeof exShPrice === 'string') exShPrice = parseFloat(exShPrice.replace(/,/g, ''));
                            if (typeof hiriseInput === 'string') hiriseInput = parseFloat(hiriseInput.replace(/,/g, ''));
                            if (typeof adInvPrice === 'string') adInvPrice = parseFloat(adInvPrice.replace(/,/g, ''));

                            if (name && name !== 'Model Name' && typeof exShPrice === 'number' && !isNaN(exShPrice)) {
                                const tcsAmount = adInvPrice * 0.001;
                                const priceWithTcs = adInvPrice + tcsAmount;

                                fetchedItems.push({
                                    id: index,
                                    cat: cat.trim().toUpperCase(),
                                    name: name,
                                    variant: variant,
                                    exShPrice: exShPrice || 0,
                                    hiriseInput: hiriseInput || 0,
                                    adInvPrice: adInvPrice || 0,
                                    tcsAmount: tcsAmount || 0,
                                    priceWithTcs: priceWithTcs || 0,
                                    qty: 0
                                });
                            }
                        });

                        setItems(fetchedItems);
                        setLoading(false);
                    } catch (err) {
                        console.error("Error fetching sheet:", err);
                        setError("Failed to fetch data from the sheet. Please ensure the Google Sheet is set to 'Anyone with the link can view'.");
                        setLoading(false);
                    }
                };

                fetchSheetData();
            }, [isAuthenticated]);

            // Calculate totals
            useEffect(() => {
                let tQty = 0;
                let tExSh = 0;
                let tHirise = 0;
                let tAdInv = 0;
                let tTcsAmount = 0;
                let tWithTcs = 0;

                items.forEach(item => {
                    const qty = parseFloat(item.qty) || 0;
                    tQty += qty;
                    tExSh += (qty * item.exShPrice);
                    tHirise += (qty * item.hiriseInput);
                    tAdInv += (qty * item.adInvPrice);
                    tTcsAmount += (qty * item.tcsAmount);
                    tWithTcs += (qty * item.priceWithTcs);
                });

                setSummary({
                    totalQty: tQty,
                    totalExSh: tExSh,
                    totalHirise: tHirise,
                    totalAdInv: tAdInv,
                    totalTcsAmount: tTcsAmount,
                    totalWithTcs: tWithTcs,
                });
            }, [items]);

            // Copy to Clipboard logic
            const copyToClipboard = (id, text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                    } catch (err) {
                        console.error('Fallback: Oops, unable to copy', err);
                    }
                    document.body.removeChild(textArea);
                }
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
            };

            const handleQtyChange = (id, value) => {
                setItems(items.map(item => 
                    item.id === id ? { ...item, qty: value >= 0 ? value : 0 } : item
                ));
            };

            const resetCalculator = () => {
                setItems(items.map(item => ({ ...item, qty: 0 })));
                setFilterModel('');
            };

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setFilterModel(''); // Reset filter when switching tabs
            };

            // ==========================================
            // RENDER LOGIN SCREEN
            // ==========================================
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4 font-sans">
                        <div className="bg-white max-w-md w-full rounded-3xl shadow-2xl p-8 border border-gray-100">
                            <div className="flex flex-col items-center mb-8">
                                <div className="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-full flex items-center justify-center shadow-lg mb-4 text-white">
                                    <IconBuilding size={40} />
                                </div>
                                <h1 className="text-2xl font-black text-gray-900 text-center tracking-tight">
                                    HIRISE AD MARGIN
                                </h1>
                                <p className="text-gray-500 font-semibold tracking-widest text-sm uppercase mt-1">Calculation</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Secure Access PIN</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                            <IconLock size={20} />
                                        </div>
                                        <input 
                                            type="password" 
                                            value={pin}
                                            onChange={(e) => setPin(e.target.value)}
                                            placeholder="Enter PIN..."
                                            className={`w-full pl-11 pr-4 py-3 rounded-xl border-2 outline-none transition-all text-lg font-bold tracking-widest ${pinError ? 'border-red-400 bg-red-50 focus:border-red-500 focus:ring-4 focus:ring-red-100' : 'border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100'}`}
                                            autoFocus
                                        />
                                    </div>
                                    {pinError && (
                                        <p className="text-red-500 text-sm font-medium mt-2 flex items-center gap-1">
                                            <IconAlertCircle size={16} /> Incorrect PIN. Try "2026".
                                        </p>
                                    )}
                                </div>
                                <button 
                                    type="submit"
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2"
                                >
                                    Login to Dashboard
                                    <IconCheckCircle2 size={20} />
                                </button>
                            </form>

                            <p className="text-center text-xs text-gray-400 font-medium mt-8">
                                Ambujgarg_official &copy; 2026
                            </p>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // RENDER LOADING & ERRORS
            // ==========================================
            if (loading) {
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center space-y-4 font-sans">
                        <IconLoader2 className="animate-spin text-blue-600" size={48} />
                        <p className="text-gray-600 font-medium">Loading data from Google Sheets...</p>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 font-sans">
                        <div className="bg-red-50 text-red-600 p-6 rounded-2xl flex flex-col items-center max-w-lg text-center border border-red-200 shadow-sm">
                            <IconAlertCircle size={48} className="mb-4 text-red-500" />
                            <h2 className="text-xl font-bold mb-2">Data Load Error</h2>
                            <p>{error}</p>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // RENDER MAIN APP
            // ==========================================
            
            // Raw Category Items
            const scItems = items.filter(item => item.cat === 'SC');
            const mcItems = items.filter(item => item.cat === 'MC');
            const selectedItems = items.filter(item => item.qty > 0); 

            // Calculate Selected Qty for badges 
            const scQty = scItems.reduce((acc, item) => acc + (parseFloat(item.qty) || 0), 0);
            const mcQty = mcItems.reduce((acc, item) => acc + (parseFloat(item.qty) || 0), 0);

            // Get Unique Model Names for the Dropdown filter
            const scUniqueModels = Array.from(new Set(scItems.map(i => i.name)));
            const mcUniqueModels = Array.from(new Set(mcItems.map(i => i.name)));

            // Filter the final displayed lists based on selected Dropdown Model
            const displayedScItems = scItems.filter(item => filterModel ? item.name === filterModel : true);
            const displayedMcItems = mcItems.filter(item => filterModel ? item.name === filterModel : true);

            const CategoryTable = ({ title, data, bgColor, modelsList }) => (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden w-fit max-w-full">
                    
                    {/* Header with Title and Model Filter */}
                    <div className={`px-4 py-3 border-b border-gray-100 flex flex-wrap items-center gap-3 ${bgColor}`}>
                        <div className="flex items-center gap-2">
                            <IconCheckCircle2 className="text-gray-700" size={20} />
                            <h2 className="text-lg font-bold text-gray-800 uppercase tracking-wide">{title}</h2>
                        </div>
                        
                        <div className="flex items-center gap-2 ml-auto">
                            <select
                                value={filterModel}
                                onChange={(e) => setFilterModel(e.target.value)}
                                className="pl-3 pr-8 py-1.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-sm font-medium text-gray-700 bg-white cursor-pointer min-w-[200px] shadow-sm"
                            >
                                <option value="">Select Model</option>
                                {modelsList.map(modelName => (
                                    <option key={modelName} value={modelName}>{modelName}</option>
                                ))}
                            </select>
                            {filterModel && (
                                <button
                                    onClick={() => setFilterModel('')}
                                    className="p-1.5 text-gray-400 hover:text-red-500 bg-white border border-gray-200 rounded-lg hover:bg-red-50 transition-colors shadow-sm"
                                    title="Clear filter"
                                >
                                    <IconX size={16} />
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Table Data */}
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-50/50 border-b border-gray-100 text-gray-500 text-xs uppercase tracking-wider">
                                    <th className="px-4 py-2 font-semibold whitespace-nowrap">Model Name</th>
                                    <th className="px-4 py-2 font-semibold whitespace-nowrap">Model Variant</th>
                                    <th className="px-4 py-2 font-semibold text-right whitespace-nowrap">HIRISE INPUT</th>
                                    <th className="px-4 py-2 font-semibold text-right bg-yellow-50/50 text-yellow-800 whitespace-nowrap">AD INV PRICE</th>
                                    <th className="px-4 py-2 font-semibold bg-blue-50 text-blue-800 text-center sticky right-0 shadow-[-4px_0_10px_rgba(0,0,0,0.02)] whitespace-nowrap">QTY (Units)</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {data.map((item) => (
                                    <tr key={item.id} className="hover:bg-gray-50/80 transition-colors group">
                                        <td className="px-4 py-1 text-sm font-medium text-gray-900 whitespace-nowrap">{item.name}</td>
                                        <td className="px-4 py-1 text-sm text-gray-600 whitespace-nowrap">{item.variant}</td>
                                        <td className="px-4 py-1 text-sm text-gray-600 text-right whitespace-nowrap">
                                            {item.hiriseInput.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}
                                        </td>
                                        <td className="px-4 py-1 text-sm font-semibold text-gray-900 text-right bg-yellow-50/30 whitespace-nowrap">
                                            {item.adInvPrice.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}
                                        </td>
                                        <td className="px-4 py-1 bg-blue-50/40 w-28 sticky right-0 shadow-[-4px_0_10px_rgba(0,0,0,0.02)] group-hover:bg-blue-50/60 transition-colors">
                                            <input
                                                type="number"
                                                min="0"
                                                value={item.qty || ''}
                                                placeholder="0"
                                                onChange={(e) => handleQtyChange(item.id, e.target.value)}
                                                className="w-full border-2 border-blue-200 rounded-md px-2 py-1 bg-white focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all text-center font-bold text-blue-800 shadow-sm"
                                            />
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {data.length === 0 && (
                            <div className="p-8 text-center text-gray-400 font-medium">
                                No models found.
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
                    <div className="max-w-screen-2xl mx-auto space-y-6">
                        
                        {/* Header Section */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-blue-600 text-white rounded-xl shadow-inner">
                                    <IconCalculator size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-900">{appName}</h1>
                                    <p className="text-sm text-green-600 font-medium flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                        Connected to Google Sheets
                                    </p>
                                </div>
                            </div>
                            <button 
                                onClick={resetCalculator}
                                className="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors font-medium text-sm"
                            >
                                <IconRefreshCw size={16} />
                                Reset Qty
                            </button>
                        </div>

                        {/* Category Tabs */}
                        <div className="flex flex-wrap items-center gap-4 mb-2">
                            <button
                                onClick={() => handleTabChange('SC')}
                                className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${
                                    activeTab === 'SC' 
                                        ? 'bg-blue-600 text-white shadow-md' 
                                        : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'
                                }`}
                            >
                                SC Models (Scooters)
                                <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${activeTab === 'SC' ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-600'}`}>
                                    Qty: {scQty}
                                </span>
                            </button>
                            <button
                                onClick={() => handleTabChange('MC')}
                                className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${
                                    activeTab === 'MC' 
                                        ? 'bg-blue-600 text-white shadow-md' 
                                        : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'
                                }`}
                            >
                                MC Models (Motorcycles)
                                <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${activeTab === 'MC' ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-600'}`}>
                                    Qty: {mcQty}
                                </span>
                            </button>
                        </div>

                        {/* Main Layout: Left Side (Table) & Right Side (Summaries) */}
                        <div className="flex flex-col xl:flex-row gap-8 items-start pb-8">
                            
                            {/* Left Side: Active Category Table */}
                            <div className="flex-1 w-full overflow-x-auto pb-4">
                                {activeTab === 'SC' && <CategoryTable title="SC Models (Scooters)" data={displayedScItems} bgColor="bg-slate-100" modelsList={scUniqueModels} />}
                                {activeTab === 'MC' && <CategoryTable title="MC Models (Motorcycles)" data={displayedMcItems} bgColor="bg-slate-100" modelsList={mcUniqueModels} />}
                            </div>

                            {/* Right Side: Summaries Stacked */}
                            <div className="w-full xl:w-[480px] shrink-0 flex flex-col gap-6 sticky top-6">
                                
                                {/* TOP CARD: Selected Items Cross-Check */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                    <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2 border-b border-gray-200 pb-4 mb-4">
                                        <IconShoppingCart size={20} className="text-indigo-600" />
                                        Selected Items Cross-Check
                                    </h3>
                                    
                                    {selectedItems.length === 0 ? (
                                        <div className="py-12 flex flex-col items-center justify-center text-gray-400">
                                            <IconShoppingCart size={48} className="mb-3 opacity-20" />
                                            <p className="text-sm font-medium">No items selected yet. Enter QTY.</p>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                                                        <th className="p-2 font-semibold rounded-tl-lg">Cat</th>
                                                        <th className="p-2 font-semibold">Model Variant</th>
                                                        <th className="p-2 font-semibold text-center bg-blue-50 text-blue-800">QTY</th>
                                                        <th className="p-2 font-semibold text-right rounded-tr-lg">HIRISE INPUT</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {selectedItems.map((item) => {
                                                        return (
                                                            <tr key={item.id} className="hover:bg-gray-50/50">
                                                                <td className="p-2 text-xs font-bold text-gray-400">{item.cat}</td>
                                                                <td className="p-2 text-sm font-medium text-gray-900">{item.variant}</td>
                                                                <td className="p-2 text-center">
                                                                    <span className="inline-block px-2 py-1 bg-blue-100 text-blue-800 font-bold rounded-lg text-sm">
                                                                        {item.qty}
                                                                    </span>
                                                                </td>
                                                                <td className="p-2 text-sm font-bold text-amber-600 text-right">
                                                                    <div className="flex items-center justify-end gap-1">
                                                                        ₹{item.hiriseInput.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}
                                                                        <button
                                                                            onClick={() => copyToClipboard(item.id, item.hiriseInput.toFixed(2))}
                                                                            className="text-gray-400 hover:text-blue-600 transition-colors p-1 rounded-md hover:bg-blue-50"
                                                                            title="Copy HIRISE INPUT"
                                                                        >
                                                                            {copiedId === item.id ? <IconCheckCircle2 size={14} className="text-green-500" /> : <IconCopy size={14} />}
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>

                                {/* BOTTOM CARD: Calculation Summary */}
                                <div className="bg-white rounded-2xl shadow-md border border-gray-200 p-6">
                                    <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2 border-b border-gray-200 pb-4">
                                        <IconFileText size={20} className="text-blue-600" />
                                        Calculation Summary
                                    </h3>
                                    
                                    <div className="space-y-3 pt-4">
                                        <div className="flex justify-between text-gray-600 items-center">
                                            <span>Total Quantity:</span>
                                            <span className="font-bold text-xl text-blue-700 bg-blue-50 px-3 py-1 rounded-lg">
                                                {summary.totalQty} <span className="text-sm font-medium text-blue-600">Units</span>
                                            </span>
                                        </div>
                                        <div className="flex justify-between text-gray-900 font-bold pt-2 border-t border-gray-100 bg-yellow-50 p-2 rounded-lg">
                                            <span>Total AD INV PRICE:</span>
                                            <span>₹{summary.totalAdInv.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}</span>
                                        </div>
                                        <div className="flex justify-between text-orange-600 font-semibold px-2">
                                            <span>Total TCS (0.1%):</span>
                                            <span>₹{summary.totalTcsAmount.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}</span>
                                        </div>
                                    </div>

                                    <div className="mt-6 pt-4 border-t-2 border-dashed border-gray-300">
                                        <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-xl border border-indigo-200 shadow-sm">
                                            <span className="text-indigo-900 font-bold text-md">Grand Total<br/><span className="text-xs font-normal opacity-75">(With TCS 0.1%)</span></span>
                                            <span className="text-indigo-700 font-black text-2xl flex items-center">
                                                <IconIndianRupee size={24} className="mr-1" />
                                                {summary.totalWithTcs.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
